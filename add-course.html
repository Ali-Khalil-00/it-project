<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>My Course Organizer</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="courses.html">My Courses</a>
            <a href="add-course.html">Add Course</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2 class="section-title">Add New Course</h2>
            <form action="#">
                <div class="form-group">
                    <label>Course Name:</label>
                    <input type="text" placeholder="Enter course name" required>
                </div>
                <div class="form-group">
                    <label>Instructor:</label>
                    <input type="text" placeholder="Dr. / Eng. Name">
                </div>
                <div class="form-group">
                    <label>Credit Hours:</label>
                    <input type="number" min="1" max="5" placeholder="e.g. 3">
                </div>
                <div class="form-group">
                    <label>Notes:</label>
                    <textarea placeholder="Write your notes here..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Add to My List</button>
            </form>
        </div>
    </main>

    <footer>
    
    </footer>
    <footer>
    <div class="custom-footer">
        designed by Ali Khalil - My Course Organizer
    </div>
</footer>
</body>
</html>
